name: BVI Daily Briefing — Email

on:
  schedule:
    # 7:00 AM EST daily (12:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — preview post in log, don't email"
        type: boolean
        default: false
      force:
        description: "Force send even if no fresh lifeguard email today"
        type: boolean
        default: false

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            google-auth \
            google-auth-oauthlib \
            google-auth-httplib2 \
            google-api-python-client \
            requests \
            beautifulsoup4

      - name: Run daily briefing pipeline
        env:
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN:       ${{ secrets.GMAIL_TOKEN }}
          WINDY_API_KEY:     ${{ secrets.WINDY_API_KEY }}
          OWM_API_KEY:       ${{ secrets.OWM_API_KEY }}
          NOTIFY_EMAIL:      ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_FROM:       ${{ secrets.NOTIFY_FROM }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          python bvi_daily_briefing.py $ARGS
