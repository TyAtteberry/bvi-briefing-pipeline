name: BVI Charter Briefing — Email

on:
  schedule:
    # 7:00 AM EST Wednesday and Saturday (12:00 UTC)
    - cron: "0 12 * * 3"   # Wednesday
    - cron: "0 12 * * 6"   # Saturday
  workflow_dispatch:
    inputs:
      edition:
        description: "Edition (auto / pre-trip / arrival)"
        required: false
        default: "auto"
      dry_run:
        description: "Dry run — print to log, don't email"
        type: boolean
        default: false

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # No extra pip installs needed — stdlib only (smtplib, json, urllib)

      - name: Run briefing pipeline
        env:
          OWM_API_KEY:     ${{ secrets.OWM_API_KEY }}
          GMAIL_SENDER:    ${{ secrets.GMAIL_SENDER }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          GMAIL_APP_PWD:   ${{ secrets.GMAIL_APP_PWD }}
        run: |
          EDITION="${{ github.event.inputs.edition || 'auto' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          ARGS="--edition $EDITION"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python bvi_briefing.py $ARGS
